  #   depends_on:
  #     - kafka
  #     - redis
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # medical-consumer:
  #   build: ../medical-labelling/consumer
  #   profiles:
  #     - medical
  #   env_file:
  #     - ../medical-labelling/.env
  #   environment:
  #     KAFKA_BROKER: kafka:9092
  #     BACKEND_API_URL: http://medical-backend:5001
  #   depends_on:
  #     - kafka
  #     - medical-backend
